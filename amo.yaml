# ===========================================================
# LR/SC Dedicated Tests
# ===========================================================

# Test 1: LR/SC cơ bản + AMO (đã có sẵn, giữ nguyên)
- test: riscv_amo_test
  description: >
    RISC-V atomic instruction extension test (basic)
  iterations: 2
  gen_test: riscv_rand_instr_test
  gen_opts: >
    +instr_cnt=5000
    +num_of_sub_program=5
    +directed_instr_0=riscv_lr_sc_instr_stream,10
    +directed_instr_1=riscv_amo_instr_stream,10
  rtl_test: core_base_test

# Test 2: LR/SC CAS retry loop (pattern phổ biến nhất)
- test: riscv_lr_sc_cas_test
  description: >
    LR/SC Compare-And-Swap retry loop pattern test.
    Generates realistic CAS loops with ALU computation
    between LR and SC, with branch-back-on-failure.
  iterations: 5
  gen_test: riscv_rand_instr_test
  gen_opts: >
    +instr_cnt=3000
    +num_of_sub_program=3
    +directed_instr_0=riscv_lr_sc_cas_loop_stream,20
  rtl_test: core_base_test

# Test 3: LR/SC ordering bits (aq/rl combinations)
- test: riscv_lr_sc_ordering_test
  description: >
    Test all valid LR/SC memory ordering combinations:
    LR / LR.aq / LR.aqrl crossed with SC / SC.rl / SC.aqrl
  iterations: 5
  gen_test: riscv_rand_instr_test
  gen_opts: >
    +instr_cnt=3000
    +num_of_sub_program=2
    +directed_instr_0=riscv_lr_sc_ordering_stream,25
  rtl_test: core_base_test

# Test 4: SC failure scenarios
- test: riscv_sc_fail_test
  description: >
    Test SC failure conditions: double SC (SC after SC),
    and SC to different address than LR.
  iterations: 5
  gen_test: riscv_rand_instr_test
  gen_opts: >
    +instr_cnt=3000
    +num_of_sub_program=2
    +directed_instr_0=riscv_sc_fail_no_reservation_stream,15
    +directed_instr_1=riscv_lr_sc_double_lr_stream,15
  rtl_test: core_base_test

# Test 5: LR/SC stress (nhiều cặp liên tiếp)
- test: riscv_lr_sc_stress_test
  description: >
    Stress test with multiple consecutive LR/SC pairs
    targeting same and different addresses.
  iterations: 3
  gen_test: riscv_rand_instr_test
  gen_opts: >
    +instr_cnt=5000
    +num_of_sub_program=3
    +directed_instr_0=riscv_lr_sc_stress_stream,20
  rtl_test: core_base_test

# Test 6: Mixed width LR/SC (RV64 only — W + D)
- test: riscv_lr_sc_mixed_width_test
  description: >
    Test both LR.W/SC.W and LR.D/SC.D on RV64 targets.
  iterations: 3
  gen_test: riscv_rand_instr_test
  gen_opts: >
    +instr_cnt=3000
    +num_of_sub_program=2
    +directed_instr_0=riscv_lr_sc_mixed_width_stream,15
  rtl_test: core_base_test

# Test 7: Comprehensive LR/SC — tất cả streams cùng lúc
- test: riscv_lr_sc_comprehensive_test
  description: >
    Comprehensive LR/SC test combining all stream types:
    basic pairs, CAS loops, ordering variants, failure
    scenarios, stress, and double-LR patterns.
  iterations: 5
  gen_test: riscv_rand_instr_test
  gen_opts: >
    +instr_cnt=8000
    +num_of_sub_program=5
    +directed_instr_0=riscv_lr_sc_instr_stream,5
    +directed_instr_1=riscv_lr_sc_cas_loop_stream,10
    +directed_instr_2=riscv_lr_sc_ordering_stream,10
    +directed_instr_3=riscv_sc_fail_no_reservation_stream,5
    +directed_instr_4=riscv_lr_sc_stress_stream,5
    +directed_instr_5=riscv_lr_sc_double_lr_stream,5
  rtl_test: core_base_test
